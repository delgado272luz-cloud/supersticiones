<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Archivo de lo Oculto</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Pirata+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            
            madera-oscura: #2c1b12; 
            madera-veta: #3d2b1f;    
            beige-suave: #eaddc7;   
            oro-viejo: #a68b5b;     
            sangre-clara: #d32f2f;  
        }

        body {
            background-color: #120c08; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Crimson Text', serif;
            color: var(--beige-suave);
        }

        .libro-contenedor {
            
            background-color: var(--madera-oscura);
            background-image: linear-gradient(45deg, var(--madera-oscura) 25%, var(--madera-veta) 100%);
            
            width: 90%;
            max-width: 900px;
            padding: 50px;
            box-sizing: border-box;
            box-shadow: 0 0 80px rgba(0,0,0,0.9), inset 0 0 100px rgba(0,0,0,0.5);
            border: 4px solid var(--oro-viejo);
            outline: 2px solid var(--madera-oscura); /* Doble borde elegante */
            position: relative;
        }

        header { text-align: center; margin-bottom: 40px; }
        
        h1 { 
            font-family: 'Pirata One', cursive; 
            font-size: clamp(3em, 10vw, 5em); 
            color: var(--oro-viejo); 
            margin: 0; 
            text-shadow: 3px 3px 5px rgba(0,0,0,0.5);
        }
        
        nav { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            margin-top: 20px;
            border-bottom: 1px solid rgba(166, 139, 91, 0.3); 
            padding-bottom: 20px; 
        }

        nav a { 
            color: var(--beige-suave); 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.3s;
            font-size: 0.9em;
        }

        nav a:hover { color: var(--oro-viejo); text-shadow: 0 0 8px var(--oro-viejo); }

        .grid-categorias {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .tarjeta {
            background: rgba(255, 255, 255, 0.05); /* Fondo casi transparente */
            padding: 40px 15px;
            border: 1px solid var(--oro-viejo);
            text-align: center;
            text-decoration: none; 
            display: block;
            transition: all 0.4s ease;
        }

        .tarjeta:hover {
            background: rgba(166, 139, 91, 0.15);
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(166, 139, 91, 0.2);
        }

        .tarjeta h3 { 
            font-family: 'Pirata One', cursive; 
            font-size: 1.8em; 
            margin: 0; 
            color: var(--beige-suave); 
            letter-spacing: 1px;
        }

        footer { 
            text-align: center; 
            margin-top: 50px; 
            font-style: italic; 
            color: var(--oro-viejo);
            opacity: 0.8;
            padding-top: 20px;
        }

        @media (max-width: 600px) {
            .libro-contenedor { padding: 30px 15px; }
            h1 { font-size: 3em; }
            nav { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="libro-contenedor">
    <header>
        <h1>El Archivo de lo Oculto</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="sobre.html">Conceptos</a>
            <a href="contacto.html">Registro</a>
        </nav>
    </header>

    <main class="grid-categorias">
        <a href="antiguas.html" class="tarjeta"><h3>Antiguas</h3></a>
        <a href="nuevas.html" class="tarjeta"><h3>Nuevas</h3></a>
        <a href="generacionales.html" class="tarjeta"><h3>Generacionales</h3></a>
        <a href="cotidianas.html" class="tarjeta"><h3>Cotidianas</h3></a>
    </main>

    <footer>
        <p>"La superstición es la religión de las mentes temerosas."</p>
    </footer>
</div>

</body>
</html>
