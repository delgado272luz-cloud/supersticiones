<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de lo Inexplicable</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Pirata+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --papel: #f4ecd8;
            --acentos: #5d4037;
        }

        body {
            background-color: #d1c4a9;
            font-family: 'Crimson Text', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .contenedor-contacto {
            background-color: var(--papel);
            width: 450px;
            padding: 40px;
            border: 2px solid #bda888;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 { font-family: 'Pirata One', cursive; font-size: 2.5em; margin-top: 0; color: #000; }
        p { color: #555; font-style: italic; margin-bottom: 25px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: bold; color: var(--acentos); margin-bottom: 5px; }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            background: #eaddc7;
            border: 1px solid #c5b396;
            font-family: 'Crimson Text', serif;
            box-sizing: border-box; /* importante para el padding */
        }

        input:focus, textarea:focus {
            outline: 2px solid var(--acentos);
            background: #fdfaf0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--acentos);
            color: #fff;
            border: none;
            font-family: 'Pirata One', cursive;
            font-size: 1.3em;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        button:hover { background-color: #3e2a24; }

        .volver { display: block; margin-top: 20px; color: var(--acentos); text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="contenedor-contacto">
    <h1>Registro de Eventos</h1>
    <p>¿Qué sucedió tras ignorar la advertencia?</p>

    <form id="formRelatos">
        <div class="form-group">
            <label>Nombre:</label>
            <input type="text" id="nombre" placeholder="Tu nombre..." required>
        </div>
        
        <div class="form-group">
            <label>Correo Electrónico:</label>
            <input type="email" id="email" placeholder="Para enviarte noticias..." required>
        </div>
        
        <div class="form-group">
            <label>La Superstición y tu relato:</label>
            <textarea id="relato" rows="5" placeholder="Escribe aquí lo que ocurrió..."></textarea>
        </div>
        
        <button type="button" onclick="enviarRelato()">Enviar al Olvido</button>
    </form>

    <a href="index.html" class="volver">← Volver al inicio</a>
</div>

<script>
    function enviarRelato() {
        const nombre = document.getElementById('nombre').value;
        if(nombre) {
            alert("Gracias, " + nombre + ". Tu relato ha sido registrado en las sombras.");
            document.getElementById('formRelatos').reset();
        } else {
            alert("Por favor, ingresa tu nombre antes de sellar el pacto.");
        }
    }
</script>

</body>
</html>
